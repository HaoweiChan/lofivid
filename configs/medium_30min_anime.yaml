# 30-minute anime preset render — middle ground between the 5-min demo and the full 2-hour preset.
#
# Quality sweet spot: 6 distinct visual scenes × 5 min each, 6 distinct ~5-min tracks DJ-mixed.
# At ~10MB/min for AV1@CQ28 / libx264@CRF22, output is ~300 MB — uploadable, watchable.

run_id: medium_30min_anime
duration_minutes: 30
output_resolution: [1920, 1080]
fps: 24
seed: 42

music:
  backend: acestep
  track_count: 6                  # 6 × ~5-min tracks
  track_seconds_range: [280, 320]
  crossfade_seconds: 6
  target_lufs: -14
  anchor:
    bpm_range: [70, 82]
    key_pool: [D minor, F major, A minor, C major]
    style_tags: [lo-fi, chillhop, vinyl crackle, instrumental]
  variations:
    - { mood: rainy night,    instruments: [piano, soft pads, light kick] }
    - { mood: sunset cafe,    instruments: [Rhodes, upright bass, brushed drums] }
    - { mood: late study,     instruments: [acoustic guitar, vinyl noise, vibraphone] }
    - { mood: morning haze,   instruments: [Wurlitzer, muted trumpet, shaker] }
    - { mood: midnight train, instruments: [synth pad, jazz drums, electric bass] }
    - { mood: snow window,    instruments: [music box, soft strings, hihat] }

visuals:
  preset: anime
  scene_count: 6
  scene_seconds: 300              # 6 × 300s = 1800s = 30min
  parallax_loop_seconds: 30
  premium_scenes: 0
  keyframe_prompt_template: |
    1girl, sitting at desk, rain on window, cozy bedroom, warm lighting,
    bookshelf, steam from mug, soft focus, ghibli style, lofi aesthetic
  loras: []

overlays:
  rain_video: assets/overlays/rain_window_loop.mp4
  rain_opacity: 0.12
  vinyl_crackle: assets/audio/vinyl_crackle_loop.wav
  vinyl_gain_db: -28
