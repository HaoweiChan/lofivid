# Anime / Ghibli "lofi girl" preset — 2-hour rainy-window study session.
# Run with: docker compose run --rm lofivid generate -c configs/anime_rainy_window.yaml

run_id: anime_rainy_window_v1
duration_minutes: 120
output_resolution: [1920, 1080]
fps: 24
seed: 42

music:
  backend: acestep
  track_count: 20                  # ~20 distinct tracks DJ-mixed into 120 min
  track_seconds_range: [330, 420]  # ~5.5-7 min per track
  crossfade_seconds: 6
  target_lufs: -14
  anchor:
    bpm_range: [70, 82]
    key_pool: [D minor, F major, A minor, C major, E minor]
    style_tags: [lo-fi, chillhop, vinyl crackle, mellow, rainy ambience]
  variations:
    - { mood: rainy night,        instruments: [piano, soft pads, light kick] }
    - { mood: sunset cafe,        instruments: [Rhodes, upright bass, brushed drums] }
    - { mood: late study,         instruments: [acoustic guitar, vinyl noise, vibraphone] }
    - { mood: morning haze,       instruments: [Wurlitzer, muted trumpet, shaker] }
    - { mood: midnight thoughts,  instruments: [electric piano, sub bass, soft snare] }
    - { mood: gentle drizzle,     instruments: [harp, tape pad, hi-hat] }
    - { mood: warm bedroom,       instruments: [piano, double bass, brushes] }
    - { mood: foggy morning,      instruments: [Rhodes, soft synth pad, kick] }
    - { mood: candle light,       instruments: [acoustic guitar, cello, vinyl] }
    - { mood: bookshop hush,      instruments: [piano, double bass, soft kick] }
    - { mood: open window breeze, instruments: [Wurlitzer, flute, gentle perc] }
    - { mood: end of day,         instruments: [Rhodes, soft pads, brushed snare] }

visuals:
  preset: anime
  scene_count: 12
  scene_seconds: 600          # 12 × 600 s = 7200 s = 120 min
  parallax_loop_seconds: 30
  premium_scenes: 0           # leave at 0 for Phase 1; bump to 1-2 in Phase 3 for Wan 2.2 hero shots
  keyframe_prompt_template: |
    1girl, sitting at desk, rain on window, cozy bedroom, warm lighting,
    bookshelf, steam from mug, soft focus
  # Override AnimePreset defaults here. Empty list = preset defaults.
  # Example:
  #   loras:
  #     - { name: ghibli_ponyxl,  weight: 0.8 }
  #     - { name: lofi_aesthetic, weight: 0.6 }
  loras: []

overlays:
  rain_video: assets/overlays/rain_window_loop.mp4
  rain_opacity: 0.15
  vinyl_crackle: assets/audio/vinyl_crackle_loop.wav
  vinyl_gain_db: -28
