# Production-quality 5-minute anime preset render.
#
# Sized to demo the full pipeline at watchable quality without committing to a
# full 2-hour render. After this works, scale up `track_count`, `scene_count`,
# `scene_seconds`, and `duration_minutes` to taste — see anime_rainy_window.yaml.

run_id: demo_5min_anime
duration_minutes: 5
output_resolution: [1280, 720]   # 720p — half the encode cost of 1080p, still YouTube-acceptable
fps: 24
seed: 7

music:
  backend: acestep
  track_count: 3                  # 3 distinct ~100-sec "songs" mixed into one 5-min stream
  track_seconds_range: [100, 110]
  crossfade_seconds: 4
  target_lufs: -14
  anchor:
    bpm_range: [70, 82]
    key_pool: [D minor, F major, A minor, C major]
    style_tags: [lo-fi, chillhop, vinyl crackle, instrumental]
  variations:
    - { mood: rainy night,    instruments: [piano, soft pads, light kick] }
    - { mood: sunset cafe,    instruments: [Rhodes, upright bass, brushed drums] }
    - { mood: late study,     instruments: [acoustic guitar, vinyl noise, vibraphone] }

visuals:
  preset: anime
  scene_count: 3
  scene_seconds: 100              # 3 × 100s = 300s = 5 min
  parallax_loop_seconds: 25
  premium_scenes: 0
  keyframe_prompt_template: |
    1girl, sitting at desk, rain on window, cozy bedroom, warm lighting,
    bookshelf, steam from mug, soft focus, ghibli style, lofi aesthetic
  loras: []                       # no custom LoRAs for the demo run

overlays:
  rain_video: assets/overlays/rain_window_loop.mp4
  rain_opacity: 0.12
  vinyl_crackle: assets/audio/vinyl_crackle_loop.wav
  vinyl_gain_db: -28
