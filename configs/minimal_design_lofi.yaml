# Minimal-design instrumental lofi: ACE-Step (local, instrumental) +
# SDXL keyframes (greenhouse-cast still-life direction) + overlay-motion
# dust_motes. 30-minute target.
#
# This config stays fully local (no API keys required) — the cloud Suno
# path lives in jazz_cafe_unsplash.yaml. The aesthetic (sage greens →
# warm cream, riso-print stillness) is driven by SDXL prompt engineering
# rather than post-process grading; the dust_motes overlay supplies the
# slow visual movement that lofi expects without the AI-MV camera orbit.
#
# Run:
#   lofivid generate -c configs/minimal_design_lofi.yaml

run_id: minimal_design_lofi_v1
duration_minutes: 30
output_resolution: [1920, 1080]
fps: 24
seed: 19840702

music:
  backend: acestep
  track_count: 6
  track_seconds_range: [280, 320]
  crossfade_seconds: 6
  target_lufs: -14
  anchor:
    bpm_range: [70, 82]
    key_pool: [D minor, F major, A minor, C major]
    style_tags: [lo-fi, instrumental, jazzy, mellow, vinyl crackle, soft]
  variations:
    - { mood: greenhouse morning, instruments: [piano, soft pads, light kick] }
    - { mood: terracotta haze,    instruments: [Rhodes, upright bass, brushed drums] }
    - { mood: paper still life,   instruments: [acoustic guitar, vibraphone, shaker] }
    - { mood: window dust,        instruments: [Wurlitzer, muted trumpet, hihat] }
    - { mood: brass watering can, instruments: [piano, cello, brushes] }
    - { mood: fern silhouette,    instruments: [vibraphone, double bass, soft kick] }

visuals:
  preset: photo                          # SDXL base 1.0 (commercial-OK)
  scene_count: 6
  scene_seconds: 300                     # 6 × 300 s = 1800 s = 30 min
  parallax_loop_seconds: 30
  premium_scenes: 0
  keyframe_backend: sdxl
  parallax_backend: overlay_motion
  motion_type: dust_motes
  # SDXL doesn't currently apply duotone post-process (would change existing
  # SDXL renders). The sage→cream palette is driven by the prompt content
  # below — single subjects, soft directional sunlight, vintage-photo cues.
  keyframe_prompt_template: |
    single subject still life, centered composition, isolated object on
    pale terracotta or wooden surface, single small monstera leaf or
    succulent or fern frond, soft directional sunlight from a greenhouse
    window, gentle morning haze, dewdrops, vintage photograph, riso print
    aesthetic, shallow depth of field, matte texture, minimalist, sage
    greens and warm cream tones, negative space around the subject
  loras: []

overlays:
  rain_video: null
  rain_opacity: 0.0
  vinyl_crackle: null
  vinyl_gain_db: -28
