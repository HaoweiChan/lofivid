# Cloud-augmented preset: Suno jazz with vocals + Unsplash photographic
# keyframes + overlay-motion slow_zoom. 30-minute target.
#
# Requires:
#   SUNO_API_KEY        — paid Suno wrapper (sunoapi.org / PiAPI / AIML API).
#                         You must verify your tier permits commercial use AND
#                         the wrapper's ToS — Suno's official ToS prohibits
#                         unofficial API access.
#   UNSPLASH_ACCESS_KEY — free at https://unsplash.com/developers
#
# Run:
#   lofivid generate -c configs/jazz_cafe_unsplash.yaml

run_id: jazz_cafe_unsplash_v1
duration_minutes: 30
output_resolution: [1920, 1080]
fps: 24
seed: 1701

music:
  backend: suno
  suno_model_version: v3.5         # pinned — bump deliberately, don't auto-upgrade
  track_count: 6                   # 6 × ~5-min tracks
  track_seconds_range: [280, 320]
  crossfade_seconds: 6
  target_lufs: -14
  anchor:
    bpm_range: [78, 92]
    key_pool: [F major, Bb major, Eb major, G minor]
    style_tags: [jazz, vocal jazz, smooth jazz, lo-fi, vinyl crackle]
  variations:
    - mood: cafe afternoon
      instruments: [Rhodes, upright bass, brushed drums]
      lyrics: |
        Soft afternoon light is pouring in
        Cup of coffee growing thin
        Conversations rise and fall
        Like a tide against the wall
    - mood: rainy window
      instruments: [piano, double bass, soft kick]
      lyrics: |
        Watch the raindrops chase each other down
        Tiny rivers crossing town
        Inside it's warm and dry
        Underneath the city sky
    - mood: late night booth
      instruments: [muted trumpet, walking bass, hihat]
      lyrics: |
        Last call but we're still talking
        Streetlights through the window walking
        Half a glass of something amber
        Half a song we both remember
    - mood: vinyl spin
      instruments: [vibraphone, acoustic guitar, shaker]
      lyrics: |
        Needle dropping on a memory
        Crackle, hum, and gently
        Lifting up the years
        Quieting our fears
    - mood: latte art
      instruments: [Wurlitzer, soft pads, brushes]
      lyrics: |
        Spinning steam into a leaf
        Tiny moment of relief
        Morning's finally arrived
        Slow and quietly alive
    - mood: bookshelf hour
      instruments: [piano, cello, light kick]
      lyrics: |
        Pages turning one by one
        Afternoon is almost gone
        Bookmarks in a quiet stack
        Nothing pulling us right back

visuals:
  preset: photo
  scene_count: 6
  scene_seconds: 300              # 6 × 300s = 1800s = 30 min
  parallax_loop_seconds: 30
  premium_scenes: 0
  keyframe_backend: unsplash
  parallax_backend: overlay_motion
  motion_type: slow_zoom
  # Warm cream → deep espresso. Light duotone, paper border applied automatically.
  duotone: [[40, 22, 8], [244, 222, 184]]
  keyframe_prompt_template: |
    cafe interior warm light
  loras: []

overlays:
  rain_video: null
  rain_opacity: 0.0
  vinyl_crackle: null
  vinyl_gain_db: -28
